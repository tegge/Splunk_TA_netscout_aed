[netscout:aed]
description = NETSCOUT Arbor Edge Defense (AED) syslog output field extraction
category = Network & Security
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = false
MAX_TIMESTAMP_LOOKAHEAD = 20
TIME_PREFIX = ^
TIME_FORMAT = %b %d %H:%M:%S
ANNOTATE_PUNCT = false
KV_MODE = none

#REPORT-netscout_aed = syslog_headers, rt, severity, src, dpt, pg_id, proto, dst, spt, pg_name, element_id, threat_name, ioc_pattern, match_type, threat_category, taxii_collection_title, taxii_collection_id
REPORT-netscout_aed = syslog_headers, rt, severity, src, dpt, proto, dst, spt, element_id, pg_id, ioc_pattern, pg_name, match_type, taxii_collection_id, taxii_collection_title, threat_name, threat_category, message, subsystem, user, account, modification, pg_and_traffic, license_and_traffic
FIELDALIAS-src_dest = dst ASNEW dest_ip, dst ASNEW dest, dpt ASNEW dest_port, spt ASNEW src_port, 
FIELDALIAS-user = account ASNEW dest_user, user ASNEW src_user
FIELDALIAS-proto = proto ASNEW protocol
FIELDALIAS-category = threat_category ASNEW category
FIELDALIAS-device = device_hostname ASNEW dvc, device_vendor ASNEW vendor
FIELDALIAS-severity_id = severity ASNEW severity_id 
FIELDALIAS-threat_object = ioc_pattern ASNEW threat_object, match_type  ASNEW threat_object_type, taxii_collection_title ASNEW threat_collection, taxii_collection_id ASNEW threat_key
EVAL-vendor_product = device_vendor." "device_product"
EVAL-ids_type = "network"
EVAL-signature = coalesce(threat_name,if(!match(device_event_class_id,"Change Log"),device_event_class_id,null()))
# Severity mapping according to CEF Standard and expected values for field severity in the IDS Datamodel
EVAL-severity = case(severity>=4 AND severity<6 ,"medium",severity<4 AND severity>=2,"low",severity==1 OR severity==0,"informational",severity==7 OR severity==8,"high",severity==9 OR severity==10,"critical")
